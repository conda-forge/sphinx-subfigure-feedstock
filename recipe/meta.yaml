{% set name = "sphinx-subfigure" %}
{% set version = "0.2.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/sphinx_subfigure-{{ version }}.tar.gz
  sha256: d106193d0076bf29bb9594dbda23d3c13e9b2490e4344bc8018b6059a195de3b

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  host:
    - flit-core >=3.4,<4
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}
    - sphinx

test:
  imports:
    - sphinx_subfigure
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/chrisjsewell/sphinx-subfigure
  summary: A sphinx extension to create sub-figures.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - chrisjsewell
